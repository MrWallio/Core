name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Core.dll (Release|x64)
        run: msbuild Core.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Publish latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          body: Automated build from commit ${{ github.sha }}
          artifacts: x64/Release/Core.dll
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
